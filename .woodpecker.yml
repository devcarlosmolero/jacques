when:
  branch: [master, main]
  event: [push]

steps:
  - name: test
    image: golang:1.25-alpine
    commands:
      - go test ./...

  - name: build
    image: golang:1.25-alpine
    commands:
      - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o jacques-bin .

  - name: deploy
    image: alpine:latest
    environment:
      VPS_SSH_KEY:
        from_secret: VPS_SSH_KEY
      VPS_IP_ADDRESS:
        from_secret: VPS_IP_ADDRESS
      JACQUES_TOKEN:
        from_secret: JACQUES_TOKEN
      JACQUES_BASE_URL:
        from_secret: JACQUES_BASE_URL
    commands:
      - apk add --no-cache openssh rsync
      - mkdir -p ~/.ssh
      - printf "%s\n" "$VPS_SSH_KEY" > ~/.ssh/id_rsa
      - chmod 600 ~/.ssh/id_rsa
      - ssh-keyscan -H $VPS_IP_ADDRESS >> ~/.ssh/known_hosts 2>&1
      - |
        printf "JACQUES_SERVER=https://raccoonisland.social\nJACQUES_TOKEN=%s\nJACQUES_BASE_URL=%s\nJACQUES_DB=/data/jacques.db\nJACQUES_LISTEN=:8080\n" "$JACQUES_TOKEN" "$JACQUES_BASE_URL" > jacques.env
      - ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@$VPS_IP_ADDRESS mkdir -p /root/npm/data/jacques
      - rsync -avz -e "ssh -i $HOME/.ssh/id_rsa -o StrictHostKeyChecking=no" jacques-bin jacques.env deploy.sh root@"$VPS_IP_ADDRESS":/root/npm/data/jacques/
      - ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@$VPS_IP_ADDRESS sh /root/npm/data/jacques/deploy.sh
      - rm -f ~/.ssh/id_rsa

  - name: publish-profile
    image: alpine:latest
    environment:
      JACQUES_TOKEN:
        from_secret: JACQUES_TOKEN
    commands:
      - apk add --no-cache curl jq
      - VERSION=$(jq -r .version version.json)
      - CREATED_BY="@iscarlosmolero@raccoonisland.social"
      - SOURCE_URL="https://codeberg.org/devcarlosmolero/jacques"
      - |
        FIELDS=$(curl -sS -H "Authorization: Bearer $JACQUES_TOKEN" \
          https://raccoonisland.social/api/v1/accounts/verify_credentials \
          | jq -c '.source.fields // []')
      - CURRENT_VERSION=$(echo "$FIELDS" | jq -r '.[]? | select(.name == "Version") | .value')
      - CURRENT_CREATOR=$(echo "$FIELDS" | jq -r '.[]? | select(.name == "Created by") | .value')
      - CURRENT_SOURCE=$(echo "$FIELDS" | jq -r '.[]? | select(.name == "Source code & Commands") | .value')
      - |
        if [ "$CURRENT_VERSION" = "$VERSION" ] && [ "$CURRENT_CREATOR" = "$CREATED_BY" ] && [ "$CURRENT_SOURCE" = "$SOURCE_URL" ]; then
          echo "profile already up to date (v$VERSION)"
        else
          echo "updating profile: v${CURRENT_VERSION:-none} -> v$VERSION"
          curl -sS -o /dev/null -w "%{http_code}\n" -X PATCH \
            https://raccoonisland.social/api/v1/accounts/update_credentials \
            -H "Authorization: Bearer $JACQUES_TOKEN" \
            --data-urlencode "fields_attributes[0][name]=Version" \
            --data-urlencode "fields_attributes[0][value]=$VERSION" \
            --data-urlencode "fields_attributes[1][name]=Created by" \
            --data-urlencode "fields_attributes[1][value]=$CREATED_BY" \
            --data-urlencode "fields_attributes[2][name]=Source code & Commands" \
            --data-urlencode "fields_attributes[2][value]=$SOURCE_URL"
        fi
